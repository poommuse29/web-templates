{% extends "base.html" %}

{% block content %}
<h1 class="mt-4">ติดต่อเรา</h1>
<ol class="breadcrumb mb-4">
    <li class="breadcrumb-item"><a href="{% url 'home' %}">Dashboard</a></li>
    <li class="breadcrumb-item active">ติดต่อเรา</li>
</ol>

<div class="row">
    <!-- Contact Form -->
    <div class="col-lg-8">
        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-paper-plane me-1"></i>
                ส่งข้อความถึงเรา
            </div>
            <div class="card-body">
                <form>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="inputName" class="form-label">ชื่อ-นามสกุล</label>
                            <input type="text" class="form-control" id="inputName" placeholder="กรอกชื่อ-นามสกุล">
                        </div>
                        <div class="col-md-6">
                            <label for="inputEmail" class="form-label">อีเมล</label>
                            <input type="email" class="form-control" id="inputEmail" placeholder="example@email.com">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="inputSubject" class="form-label">หัวข้อ</label>
                        <input type="text" class="form-control" id="inputSubject" placeholder="หัวข้อที่ต้องการติดต่อ">
                    </div>
                    <div class="mb-3">
                        <label for="inputMessage" class="form-label">ข้อความ</label>
                        <textarea class="form-control" id="inputMessage" rows="5" placeholder="พิมพ์ข้อความของคุณที่นี่..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane me-1"></i>ส่งข้อความ
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Contact Info Sidebar -->
    <div class="col-lg-4">
        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-address-card me-1"></i>
                ข้อมูลการติดต่อ
            </div>
            <div class="card-body">
                <div class="d-flex align-items-center mb-3">
                    <div class="bg-primary text-white rounded-circle p-2 me-3" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div>
                        <div class="small text-muted">ที่อยู่</div>
                        <div>123 ถนนตัวอย่าง กรุงเทพฯ 10100</div>
                    </div>
                </div>
                <hr>
                <div class="d-flex align-items-center mb-3">
                    <div class="bg-success text-white rounded-circle p-2 me-3" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div>
                        <div class="small text-muted">โทรศัพท์</div>
                        <div>02-123-4567</div>
                    </div>
                </div>
                <hr>
                <div class="d-flex align-items-center mb-3">
                    <div class="bg-warning text-white rounded-circle p-2 me-3" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div>
                        <div class="small text-muted">อีเมล</div>
                        <div>contact@myurl.com</div>
                    </div>
                </div>
                <hr>
                <div class="d-flex align-items-center">
                    <div class="bg-info text-white rounded-circle p-2 me-3" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div>
                        <div class="small text-muted">เวลาทำการ</div>
                        <div>จันทร์ - ศุกร์ 9:00 - 17:00</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Social Media -->
        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-share-alt me-1"></i>
                ติดตามเรา
            </div>
            <div class="card-body text-center">
                <a href="#" class="btn btn-outline-primary btn-sm me-1"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="btn btn-outline-info btn-sm me-1"><i class="fab fa-twitter"></i></a>
                <a href="#" class="btn btn-outline-danger btn-sm me-1"><i class="fab fa-instagram"></i></a>
                <a href="#" class="btn btn-outline-dark btn-sm"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
